name: ci

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  build-and-sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: gitops-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Prepare image tags
        id: meta
        run: |
          IMAGE="${REGISTRY}/${{ secrets.GHCR_USERNAME }}/${IMAGE_NAME}:${GITHUB_SHA}"
          LATEST_IMAGE="${REGISTRY}/${{ secrets.GHCR_USERNAME }}/${IMAGE_NAME}:latest"
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "latest_image=${LATEST_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ steps.meta.outputs.latest_image }}

      - name: Update Kubernetes deployment image
        run: |
          sed -i "s|image: .*|image: ${{ steps.meta.outputs.image }}|" k8s/deployment.yaml

      - name: Commit manifest update
        run: |
          if git diff --quiet; then
            echo "No manifest changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git commit -m "ci: update deployment image to ${{ steps.meta.outputs.short_sha }}"
          git push

